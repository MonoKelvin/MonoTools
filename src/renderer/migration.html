<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoTools</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', sans-serif;
        background-color: #1e1e1e;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        text-align: center;
        padding: 40px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto 30px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #409eff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .message {
        font-size: 16px;
        color: #e0e0e0;
        margin-bottom: 20px;
      }

      .complete {
        font-size: 18px;
        color: #67c23a;
        font-weight: 500;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner" id="spinner"></div>
      <div class="message" id="migration-message">正在迁移您的数据...</div>
      <div class="complete hidden" id="migration-complete">
        <p>迁移完成！</p>
        <p style="font-size: 14px; color: #b0b0b0; margin-top: 10px">正在重新启动应用...</p>
      </div>
    </div>
  </body>
</html>
